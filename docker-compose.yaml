version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: quizz-us-backend
    ports:
      - "8080:8080"
      - "9090:9090"
    networks:
      - quizz-us-network
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: quizz-us-frontend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
    networks:
      - quizz-us-network
    depends_on:
      - backend
    restart: unless-stopped

networks:
  quizz-us-network:
    driver: bridge
